<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
<script src="auth.js" defer></script>
<script src="lang.js" defer></script>
</head>
<body>
<header>
  <nav class="nav">
    <div class="logo">LearnProgramming.dev</div>
    <div>
      <span class="lang-switch" onclick="setLang('pl')">🇵🇱</span>
      <span class="lang-switch" onclick="setLang('en')">🇬🇧</span>
      <button onclick="toggleTheme()" class="btn-secondary" style="padding:0.3rem 0.8rem;">🌓</button>
      <a id="authLink" href="login.html" data-t="login">Login</a>
    </div>
  </nav>
</header>
<div class="card">
  <h2 data-t="login">Login</h2>
  <div id="loginTooltip"></div>
  <label data-t="email">Email</label>
  <input id="loginEmail" type="email">
  <label data-t="password">Password</label>
  <input id="loginPass" type="password">
  <button class="btn btn-primary" onclick="loginUser()" data-t="login">Login</button>
  <p style="margin-top:0.5rem;">
    <a href="register.html" data-t="create_account">Create a new account</a><br>
    <a href="#" onclick="alert('Reset not implemented')" data-t="forgot">I don’t remember my password</a>
  </p>
</div>
<footer>
  <p>© 2026 LearnProgramming.dev — <span data-t="terms">Terms & Conditions</span></p>
</footer>
</body>
</html>
