<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panel</title>
<link rel="stylesheet" href="style.css">
<script src="auth.js" defer></script>
<script src="lang.js" defer></script>
</head>
<body>
<header>
  <nav class="nav">
    <div class="logo">LearnProgramming.dev</div>
    <div>
      <span class="lang-switch" onclick="setLang('pl')">🇵🇱</span>
      <span class="lang-switch" onclick="setLang('en')">🇬🇧</span>
      <button onclick="toggleTheme()" class="btn-secondary" style="padding:0.3rem 0.8rem;">🌓</button>
      <a href="#" onclick="logout()" data-t="logout">Logout</a>
    </div>
  </nav>
</header>
<main>
  <h2 data-t="panel">Panel</h2>
  <p><span data-t="hello">Hello</span>, <span id="userName"></span></p>
  <h3 data-t="your_courses">Your courses</h3>
  <div style="margin:1rem 0;">
    <strong id="levelDisplay">Level 1</strong>
  </div>
  <div class="xp-bar">
    <div id="xpFillPanel" class="xp-fill"></div>
  </div>
  <h3 style="margin-top:2rem;">Achievements</h3>
  <div id="achievementsList"></div>
  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const list = JSON.parse(localStorage.getItem("achievements") || "[]");
    const box = document.getElementById("achievementsList");
    if (list.length === 0) {
      box.innerHTML = "<p>No achievements yet.</p>";
    } else {
      box.innerHTML = list.map(a => `<div class="achievement unlocked">${a}</div>`).join("");
    }
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    const el = document.getElementById("userName");
    if (el) el.textContent = user.name || "";
  });
  </script>
  <div class="lesson-grid">
    <div class="lesson-tile" onclick="openLesson('lesson1')">
      <div class="lesson-icon">🐍</div>
      <div class="lesson-title">Python Intro</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson2')">
      <div class="lesson-icon">🔤</div>
      <div class="lesson-title">Variables</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson3')">
      <div class="lesson-icon">🔢</div>
      <div class="lesson-title">Data Types</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson4')">
      <div class="lesson-icon">📜</div>
      <div class="lesson-title">Lists</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson5')">
      <div class="lesson-icon">🔁</div>
      <div class="lesson-title">Loops</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson6')">
      <div class="lesson-icon">🔀</div>
      <div class="lesson-title">Conditions</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson7')">
      <div class="lesson-icon">⚙️</div>
      <div class="lesson-title">Functions</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson8')">
      <div class="lesson-icon">🐞</div>
      <div class="lesson-title">Debugging</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson9')">
      <div class="lesson-icon">❗</div>
      <div class="lesson-title">Errors</div>
    </div>
    <div class="lesson-tile" onclick="openLesson('lesson10')">
      <div class="lesson-icon">🧪</div>
      <div class="lesson-title">Quiz</div>
    </div>
  </div>
</main>
<footer>
  <p>© 2026 LearnProgramming.dev — <span data-t="terms">Terms & Conditions</span></p>
</footer>
</body>
</html>
