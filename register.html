<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<link rel="stylesheet" href="style.css">
<script src="auth.js" defer></script>
<script src="lang.js" defer></script>
</head>
<body>
<header>
  <nav class="nav">
    <div class="logo">LearnProgramming.dev</div>
    <div>
      <span class="lang-switch" onclick="setLang('pl')">🇵🇱</span>
      <span class="lang-switch" onclick="setLang('en')">🇬🇧</span>
      <button onclick="toggleTheme()" class="btn-secondary" style="padding:0.3rem 0.8rem;">🌓</button>
      <a id="authLink" href="login.html" data-t="login">Login</a>
    </div>
  </nav>
</header>
<div class="card" style="margin-top:3rem;">
  <h2 data-t="create_account">Create new account</h2>
  <div id="regTooltip"></div>
  <label data-t="name">Name</label>
  <input id="regName" type="text">
  <label data-t="email">Email</label>
  <input id="regEmail" type="email">
  <label data-t="password">Password</label>
  <input id="regPass" type="password">
  <button class="btn btn-primary" onclick="registerUser()" data-t="create_account">Create new account</button>
</div>
<footer>
  <p>© 2026 LearnProgramming.dev — <span data-t="terms">Terms & Conditions</span></p>
</footer>
</body>
</html>
